<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Football Climb</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:Arial,sans-serif;touch-action:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;background:#111}

/* MODE SCREEN */
#modeScreen{position:fixed;inset:0;z-index:30;background:linear-gradient(#16384a,#111);display:flex;align-items:center;justify-content:center;color:#fff;text-align:center}
.card{width:320px;padding:26px;border-radius:24px;background:rgba(255,255,255,.1)}
.card img{width:92px;height:92px;border-radius:22px;margin-bottom:14px}
.card h1{font-size:30px;margin:0 0 8px}
.card p{font-size:15px;margin:0 0 20px;opacity:.9}
.modeBtn{border:0;border-radius:999px;color:#fff;font:900 18px Arial;padding:14px 30px;margin:8px;width:220px}
.normal{background:#3498db;box-shadow:0 5px 0 #21618c}
.easy{background:#2ecc71;box-shadow:0 5px 0 #239b56}

/* CONTROLS */
#mobileControls{position:fixed;inset:0;z-index:5;display:none;pointer-events:none}

.ctrl{
position:absolute;
width:92px;
height:92px;
border:0;
padding:0;
margin:0;
outline:0;
appearance:none;
-webkit-appearance:none;
background-color:transparent;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
box-shadow:none;
opacity:.92;
pointer-events:auto;
}

.ctrl:active,
.ctrl.on{
transform:scale(.92);
opacity:1;
filter:brightness(1.18);
}

/* Image assets */
.left{background-image:url("assets/ui/button_left.png")}
.right{background-image:url("assets/ui/button_right.png")}
.jump{background-image:url("assets/ui/button_jump.png")}
.lob{background-image:url("assets/ui/button_lob.png")}
.grab{background-image:url("assets/ui/button_grab.png")}

/* LEFT SIDE (same for both modes) */
.left{left:34px;bottom:34px}
.right{left:128px;bottom:34px}

/* NORMAL MODE (3 buttons right - matches your layout) */
.jump{right:190px;bottom:60px}
.lob{right:90px;bottom:60px}
.grab{right:140px;bottom:6px}

/* EASY MODE (2 buttons right - matches red marks) */
.easyMode .jump{right:170px;bottom:34px}
.easyMode .lob{right:54px;bottom:34px}
.easyMode .grab{display:none}

/* ROTATE */
#rotate{position:fixed;inset:0;background:#000;color:#fff;z-index:20;display:none;align-items:center;justify-content:center;text-align:center;padding:24px}
#rotate h2{font-size:28px;margin:0 0 10px}
#rotate p{font-size:16px;margin:0}

#mobileControls{display:block}

@media (hover:hover) and (pointer:fine){
  #mobileControls{display:none}
}

@media (orientation:portrait){
  #rotate{display:flex}
  #mobileControls{display:none}
}

@media (hover:hover) and (pointer:fine) and (orientation:portrait){
  #rotate{display:none}
}
 
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- MODE SELECT -->
<div id="modeScreen">
  <div class="card">
    <img src="assets/ball/football.png">
    <h1>Football Climb</h1>
    <p>Select game mode</p>
    <button class="modeBtn normal" onclick="loadGame('normal')">Normal Mode</button>
    <button class="modeBtn easy" onclick="loadGame('easy')">Easy Mode</button>
  </div>
</div>

<!-- ROTATE -->
<div id="rotate">
  <div>
    <h2>Rotate Device</h2>
    <p>Please rotate your phone to landscape to play.</p>
  </div>
</div>

<!-- CONTROLS -->
<div id="mobileControls">
  <button class="ctrl left" data-k="l"></button>
  <button class="ctrl right" data-k="r"></button>
  <button class="ctrl jump" data-k="u"></button>
  <button class="ctrl lob" data-k="lob"></button>
  <button class="ctrl grab" data-k="grab"></button>
</div>

<script src="src/assets.js"></script>

<script>
function loadGame(mode){
  document.getElementById('modeScreen').style.display='none';

  if(mode==='easy'){
    document.body.classList.add('easyMode');
  }else{
    document.body.classList.remove('easyMode');
  }

  const script=document.createElement('script');
  script.src = mode==='easy' ? 'src/game_easy.js' : 'src/game.js';
  document.body.appendChild(script);
}
</script>

</body>
</html>
